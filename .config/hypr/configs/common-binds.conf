source = ~/.config/hypr/keywords.conf

# Launcher
bindi = $mainMod, Super_L, global, caelestia:launcher
bindin = $mainMod, catchall, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:272, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:273, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:274, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:275, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:276, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:277, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse_up, global, caelestia:launcherInterrupt
bindin = $mainMod, mouse_down, global, caelestia:launcherInterrupt

# Window
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod+SHIFT, F, togglefloating,

# Clipboard and emoji
bind = $mainMod, V, exec, caelestia clipboard
bind = $mainMod+Alt, V, exec, caelestia clipboard -d
bind = $mainMod, Period, exec, caelestia emoji -p
bindl = Ctrl+Shift+Alt, V, exec, sleep 0.5s && ydotool type -d 1 "$(cliphist list | head -1 | cliphist decode)"

# Apps
bind = $mainMod, T, exec, app2unit -- $terminal ~/.dotfiles/scripts/kitty-tmux.zsh
bind = $mainMod, E, exec, app2unit -- $fileManager
bind = $mainMod, B, exec, app2unit -- $browser
bind = $mainMod, C, exec, app2unit -- $editor
bind = Ctrl+Alt, V, exec, app2unit -- pavucontrol

# Utilities
bind = $mainMod+Ctrl, S, global, caelestia:screenshotFreezeClip
bind =  , Print, global, caelestia:screenshotFreezeClip
bindl = Ctrl, Print, exec, caelestia screenshot
bind = Ctrl+Alt, R, exec, caelestia record
bind = $mainMod+Alt, R, exec, caelestia record -s
bind = $mainMod+Shift, R, exec, caelestia record -r
bind = $mainMod+Shift, C, exec, hyprpicker -a
binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = $mainMod, 0, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod, BackSpace, global, caelestia:lock
bind = $mainMod, a, global, caelestia:sidebar

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown
bindl = alt, F9, global, caelestia:brightnessDown
bindl = alt, F10, global, caelestia:brightnessUp

# Volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = alt,F3, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = alt,F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = alt,F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = alt,F5, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media
bindl = $mainMod, F1, global, caelestia:mediaToggle
bindl = $mainMod, F3, global, caelestia:mediaNext
bindl = $mainMod, F2, global, caelestia:mediaPrev
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
bindl = , XF86AudioNext, global, caelestia:mediaNext
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop

# Special workspaces
bind = $ctrlMod+Shift, Escape, exec, caelestia toggle sysmon
bind = $mainMod, D, exec, caelestia toggle communication
bind = $mainMod, N, exec, caelestia toggle notes
bind = $mainMod, M, exec, caelestia toggle music
bind = $mainMod, S, togglespecialworkspace, special
bind = $mainMod SHIFT, S, movetoworkspace, special:special

# Workspace switching (except WS5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 1, submap, global
bind = $mainMod, 2, submap, global
bind = $mainMod, 3, submap, global
bind = $mainMod, 4, submap, global
bind = $mainMod, 6, submap, global
bind = $mainMod, 7, submap, global
bind = $mainMod, 8, submap, global
bind = $mainMod, 9, submap, global

# Move to workspace (except WS5)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 1, submap, global
bind = $mainMod SHIFT, 2, submap, global
bind = $mainMod SHIFT, 3, submap, global
bind = $mainMod SHIFT, 4, submap, global
bind = $mainMod SHIFT, 6, submap, global
bind = $mainMod SHIFT, 7, submap, global
bind = $mainMod SHIFT, 8, submap, global
bind = $mainMod SHIFT, 9, submap, global

bind = $mainMod+ALT, 2, movetoworkspacesilent, 2
bind = $mainMod+ALT, 3, movetoworkspacesilent, 3
bind = $mainMod+ALT, 4, movetoworkspacesilent, 4
bind = $mainMod+ALT, 5, movetoworkspacesilent, 5
bind = $mainMod+ALT, 6, movetoworkspacesilent, 6
bind = $mainMod+ALT, 7, movetoworkspacesilent, 7
bind = $mainMod+ALT, 8, movetoworkspacesilent, 8
bind = $mainMod+ALT, 9, movetoworkspacesilent, 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
