source = ~/.config/hypr/keywords.conf
exec = hyprctl dispatch submap global

# ======= GLOBAL SUBMAP =======
submap = global

source = ~/.config/hypr/configs/common-binds.conf

# Layout (dwindle)
bind = $mainMod+$ctrlMod, P, pseudo,
bind = $mainMod+$ctrlMod, J, layoutmsg, togglesplit

# Movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod+SHIFT, h, movewindow, l
bind = $mainMod+SHIFT, l, movewindow, r
bind = $mainMod+SHIFT, k, movewindow, u
bind = $mainMod+SHIFT, j, movewindow, d


# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive,  30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive,  0 -30
binde = , j, resizeactive,  0  30
bind  = , escape, submap, global
submap = global

# WS5 scrolling
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 5, submap, scrolling
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 5, submap, scrolling

# ======= SCROLLING SUBMAP (WS 5) =======
submap = scrolling

source = ~/.config/hypr/configs/common-binds.conf

# Movement — scrolling layout
bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, l, layoutmsg, move +col
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod+SHIFT, h, layoutmsg, swapcol l
bind = $mainMod+SHIFT, l, layoutmsg, swapcol r
bind = $mainMod+SHIFT, k, layoutmsg, movewindowto u
bind = $mainMod+SHIFT, j, layoutmsg, movewindowto d

# Column sizing
bind = $mainMod, bracketright, layoutmsg, colresize +conf
bind = $mainMod, bracketleft,  layoutmsg, colresize -conf
bind = $mainMod, W, layoutmsg, fit active

# Alternative column resize
bind = $mainMod, R, submap, resize-scrolling
submap = resize-scrolling
binde = , l, layoutmsg, colresize +0.1
binde = , h, layoutmsg, colresize -0.1
bind  = , escape, submap, scrolling
submap = scrolling

# WS5 stays in scrolling submap
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 5, movetoworkspace, 5
